<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B4F72">
  <title>Esta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 400px;
      padding: 40px 24px;
    }
    .logo {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo h1 {
      font-size: 48px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 4px;
    }
    .logo p {
      font-size: 14px;
      color: #7f8c8d;
      margin-top: 8px;
    }
    .card {
      background: #1a2634;
      border-radius: 16px;
      padding: 32px 24px;
      border: 1px solid #2c3e50;
    }
    .card h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #fff;
    }
    .input-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #95a5a6;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: #0f1923;
      border: 1px solid #2c3e50;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2E86C1; }
    .btn {
      width: 100%;
      padding: 15px;
      background: #1B4F72;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #2E86C1; }
    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #7f8c8d;
    }
    .footer-link a {
      color: #2E86C1;
      text-decoration: none;
    }
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #7f8c8d;
      background: transparent;
      border: none;
      transition: all 0.2s;
    }
    .tab.active {
      background: #1B4F72;
      color: #fff;
    }
    .form-section { display: none; }
    .form-section.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>ESTA</h1>
      <p>Emlak & İnşaat Yönetim Platformu</p>
    </div>
    <div class="card">
      <div class="tab-bar">
        <button class="tab active" onclick="switchTab('giris')">Giriş Yap</button>
        <button class="tab" onclick="switchTab('kayit')">Hesap Oluştur</button>
      </div>

      <div class="form-section active" id="giris">
        <div class="input-group">
          <label>E-posta</label>
          <input type="email" placeholder="ornek@sirket.com">
        </div>
        <div class="input-group">
          <label>Şifre</label>
          <input type="password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="girisYap()">Giriş Yap</button>
      </div>

      <div class="form-section" id="kayit">
        <div class="input-group">
          <label>Şirket Adı</label>
          <input type="text" placeholder="Şirketinizin adı">
        </div>
        <div class="input-group">
          <label>E-posta</label>
          <input type="email" placeholder="ornek@sirket.com">
        </div>
        <div class="input-group">
          <label>Şifre</label>
          <input type="password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="kayitOl()">Hesap Oluştur</button>
      </div>
    </div>
    <div class="footer-link">
      <a href="#">Şifremi unuttum</a>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    function girisYap() {
      alert('Yakında aktif olacak!');
    }

    function kayitOl() {
      alert('Yakında aktif olacak!');
    }
  </script>
</body>
</html>
