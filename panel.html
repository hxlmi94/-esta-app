<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA - Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D1620; --surface:#16233A; --line:#26344D;
    --text:#EEF3FA; --muted:#8FA0BC; --accent:#F0A848; --accent-dim:#c98a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh}
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--line); background:var(--surface);
  }
  .brand{font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; letter-spacing:1px}
  .brand span{color:var(--accent)}
  .user-box{display:flex; align-items:center; gap:14px; font-size:14px; color:var(--muted)}
  .btn{border:none; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; transition:.15s; font-family:inherit}
  .btn-out{background:transparent; color:var(--muted); border:1px solid var(--line); padding:8px 14px}
  .btn-out:hover{border-color:var(--accent); color:var(--text)}
  .wrap{max-width:760px; margin:0 auto; padding:32px 28px}
  h3{font-family:'Space Grotesk',sans-serif; font-size:18px; margin-bottom:14px}
  .panel{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:24px; margin-bottom:24px}
  .upload-row{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
  input[type=file]{
    flex:1; min-width:180px; padding:11px; background:#0F1A29; border:1px solid var(--line);
    border-radius:10px; color:var(--text); font-size:14px;
  }
  input[type=file]::file-selector-button{
    background:var(--line); color:var(--text); border:none; padding:7px 12px;
    border-radius:7px; margin-right:10px; cursor:pointer; font-family:inherit;
  }
  .btn-primary{background:var(--accent); color:#1a1205; padding:11px 20px}
  .btn-primary:hover{background:var(--accent-dim)}
  #yuklemeMsg{margin-top:12px; font-size:14px; color:var(--muted)}
  ul{list-style:none}
  li{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:13px 16px; background:#0F1A29; border:1px solid var(--line);
    border-radius:10px; margin-bottom:10px;
  }
  li a{color:var(--text); text-decoration:none; font-size:14px; word-break:break-all}
  li a:hover{color:var(--accent)}
  .btn-del{background:transparent; color:#ff8a8a; border:1px solid #4a2b2b; padding:6px 12px}
  .btn-del:hover{background:#ff8a8a; color:#2a0d0d}
  .empty{color:var(--muted); font-size:14px; padding:8px 0}
</style>
</head>
<body>
  <header>
    <div class="brand">EST<span>A</span></div>
    <div class="user-box">
      <span id="user"></span>
      <button class="btn btn-out" onclick="cikisYap()">Cikis</button>
    </div>
  </header>

  <div class="wrap">
    <div class="panel">
      <h3>Belge Yukle</h3>
      <div class="upload-row">
        <input type="file" id="dosya">
        <button class="btn btn-primary" onclick="dosyaYukle()">Yukle</button>
      </div>
      <p id="yuklemeMsg"></p>
    </div>

    <div class="panel">
      <h3>Belgelerim</h3>
      <ul id="liste"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(
      "https://pqwdvquguxddyymcpycl.supabase.co",
      "sb_publishable_kO2P-u-K-TfRlbwFvlQAsg_Pek28vM7"
    );
    const BUCKET = "documents";
    let userId = null;

    (async () => {
      const { data } = await sb.auth.getSession();
      if (!data.session) { location.href = "login.html"; return; }
      userId = data.session.user.id;
      user.textContent = data.session.user.email;
      dosyalariListele();
    })();

    async function dosyaYukle() {
      const f = document.getElementById("dosya").files[0];
      if (!f) { yuklemeMsg.textContent = "Once bir dosya secin."; return; }
      const yol = userId + "/" + Date.now() + "_" + f.name;
      const { error } = await sb.storage.from(BUCKET).upload(yol, f);
      yuklemeMsg.textContent = error ? error.message : "Belge yuklendi.";
      if (!error) dosyalariListele();
    }

    async function dosyalariListele() {
      const { data, error } = await sb.storage.from(BUCKET).list(userId);
      if (error) return;
      liste.innerHTML = "";
      if (!data.length) { liste.innerHTML = '<p class="empty">Henuz belge yok. Ilk belgenizi yukleyin.</p>'; return; }
      data.forEach(d => {
        const yol = userId + "/" + d.name;
        const url = sb.storage.from(BUCKET).getPublicUrl(yol).data.publicUrl;
        liste.innerHTML += `<li><a href="${url}" target="_blank">${d.name}</a>
          <button class="btn btn-del" onclick="dosyaSil('${d.name}')">Sil</button></li>`;
      });
    }

    async function dosyaSil(ad) {
      const yol = userId + "/" + ad;
      const { error } = await sb.storage.from(BUCKET).remove([yol]);
      if (!error) dosyalariListele();
    }

    async function cikisYap() {
      await sb.auth.signOut();
      location.href = "login.html";
    }
  </script>
</body>
</html>
