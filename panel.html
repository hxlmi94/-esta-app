<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA - Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0608; --surface:#140A0D; --line:#3A2A2E;
    --text:#F3E9DC; --muted:#9C8A82;
    --gold:#C9A24B; --gold-soft:#E3C77E; --wine:#5C1A2B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Jost',sans-serif; background:var(--bg); color:var(--text); min-height:100vh;
    background-image:radial-gradient(ellipse at 50% -10%, rgba(92,26,43,.30), transparent 50%);
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 30px; border-bottom:1px solid var(--line);
  }
  .brand{font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700; letter-spacing:4px}
  .brand small{display:block; font-family:'Cormorant Garamond',serif; font-size:9px; letter-spacing:5px; color:var(--gold); text-transform:uppercase; margin-bottom:-4px}
  .user-box{display:flex; align-items:center; gap:16px; font-size:13px; color:var(--muted); letter-spacing:.5px}
  .btn{border-radius:2px; cursor:pointer; transition:.2s; font-family:'Jost',sans-serif; font-weight:500; letter-spacing:1.5px; text-transform:uppercase}
  .btn-out{background:transparent; color:var(--muted); border:1px solid var(--line); padding:9px 16px; font-size:12px}
  .btn-out:hover{border-color:var(--gold); color:var(--gold-soft)}
  .wrap{max-width:780px; margin:0 auto; padding:40px 30px}
  .panel{background:var(--surface); border:1px solid var(--line); border-radius:4px; padding:30px; margin-bottom:26px; position:relative}
  .panel::before{content:""; position:absolute; inset:5px; border:1px solid rgba(201,162,75,.15); border-radius:2px; pointer-events:none}
  h3{font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; letter-spacing:1px; margin-bottom:4px}
  .h3-rule{width:40px; height:1px; background:var(--gold); margin-bottom:20px}
  .upload-row{display:flex; gap:14px; align-items:center; flex-wrap:wrap}
  input[type=file]{
    flex:1; min-width:200px; padding:12px; background:#0B0608; border:1px solid var(--line);
    border-radius:2px; color:var(--text); font-size:14px; font-family:inherit;
  }
  input[type=file]::file-selector-button{
    background:var(--wine); color:var(--text); border:none; padding:8px 14px;
    border-radius:2px; margin-right:12px; cursor:pointer; font-family:inherit; letter-spacing:.5px;
  }
  .btn-primary{background:var(--gold); color:#1a1206; border:1px solid var(--gold); padding:12px 24px; font-size:12px}
  .btn-primary:hover{background:var(--gold-soft)}
  #yuklemeMsg{margin-top:14px; font-size:13px; color:var(--gold-soft); letter-spacing:.5px}
  ul{list-style:none}
  li{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:14px 18px; background:#0B0608; border:1px solid var(--line);
    border-radius:2px; margin-bottom:10px;
  }
  li a{color:var(--text); text-decoration:none; font-size:14px; word-break:break-all; letter-spacing:.3px}
  li a:hover{color:var(--gold-soft)}
  .btn-del{background:transparent; color:#c98a8a; border:1px solid #4a2b2e; padding:7px 14px; font-size:11px}
  .btn-del:hover{background:var(--wine); color:var(--text); border-color:var(--wine)}
  .empty{color:var(--muted); font-size:14px; padding:6px 0; font-style:italic}
</style>
</head>
<body>
  <header>
    <div class="brand"><small>Est. Anatolia</small>ESTA</div>
    <div class="user-box">
      <span id="user"></span>
      <button class="btn btn-out" onclick="cikisYap()">Cikis</button>
    </div>
  </header>

  <div class="wrap">
    <div class="panel">
      <h3>Moduller</h3><div class="h3-rule"></div>
      <a href="bina.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:12px 24px">Bina Yonetimi →</a>
      <a href="aidat.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:12px 24px;margin-left:10px">Aidat Takibi →</a>
      <a href="gider.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:12px 24px;margin-left:10px">Gider/Gelir →</a>
      <a href="talepler.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:12px 24px;margin-left:10px">Talep & Duyuru →</a>
      <a href="emlak.html" class="btn btn-primary" style="display:inline-block;text-decoration:none;padding:12px 24px;margin-left:10px">Emlak →</a>
    </div>
    <div class="panel">
      <h3>Belge Yukle</h3><div class="h3-rule"></div>
      <div class="upload-row">
        <input type="file" id="dosya">
        <button class="btn btn-primary" onclick="dosyaYukle()">Yukle</button>
      </div>
      <p id="yuklemeMsg"></p>
    </div>

    <div class="panel">
      <h3>Belgelerim</h3><div class="h3-rule"></div>
      <ul id="liste"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(
      "https://pqwdvquguxddyymcpycl.supabase.co",
      "sb_publishable_kO2P-u-K-TfRlbwFvlQAsg_Pek28vM7"
    );
    const BUCKET = "documents";
    let userId = null;

    (async () => {
      const { data } = await sb.auth.getSession();
      if (!data.session) { location.href = "login.html"; return; }
      userId = data.session.user.id;
      user.textContent = data.session.user.email;
      dosyalariListele();
    })();

    async function dosyaYukle() {
      const f = document.getElementById("dosya").files[0];
      if (!f) { yuklemeMsg.textContent = "Once bir dosya secin."; return; }
      const yol = userId + "/" + Date.now() + "_" + f.name;
      const { error } = await sb.storage.from(BUCKET).upload(yol, f);
      yuklemeMsg.textContent = error ? error.message : "Belge yuklendi.";
