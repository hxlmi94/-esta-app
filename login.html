<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0608; --surface:#140A0D; --line:#3A2A2E;
    --text:#F3E9DC; --muted:#9C8A82;
    --gold:#C9A24B; --gold-soft:#E3C77E; --wine:#5C1A2B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Jost',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(92,26,43,.35), transparent 55%),
      radial-gradient(circle at 50% 100%, rgba(201,162,75,.06), transparent 50%);
  }
  .card{
    width:100%; max-width:400px; background:var(--surface);
    border:1px solid var(--line); border-radius:4px; padding:46px 40px;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
    position:relative;
  }
  .card::before{
    content:""; position:absolute; inset:6px; border:1px solid rgba(201,162,75,.25);
    border-radius:2px; pointer-events:none;
  }
  .crest{
    text-align:center; font-family:'Cormorant Garamond',serif; letter-spacing:8px;
    font-size:11px; color:var(--gold); margin-bottom:6px; text-transform:uppercase;
  }
  .brand{
    text-align:center; font-family:'Cormorant Garamond',serif; font-weight:700;
    font-size:52px; letter-spacing:6px; line-height:1; color:var(--text);
  }
  .rule{
    width:50px; height:1px; background:var(--gold); margin:16px auto 8px;
  }
  .sub{text-align:center; color:var(--muted); font-size:13px; font-weight:300; letter-spacing:1px; margin-bottom:34px}
  label{display:block; font-size:11px; color:var(--gold-soft); letter-spacing:2px; text-transform:uppercase; margin:18px 0 7px}
  input{
    width:100%; padding:13px 14px; background:#0B0608; border:1px solid var(--line);
    border-radius:2px; color:var(--text); font-size:15px; font-family:inherit; outline:none; transition:.2s;
  }
  input:focus{border-color:var(--gold)}
  .btn{
    width:100%; padding:14px; border-radius:2px; font-size:13px; letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; margin-top:22px; transition:.2s; font-family:'Jost',sans-serif; font-weight:500;
  }
  .btn-primary{background:var(--gold); color:#1a1206; border:1px solid var(--gold)}
  .btn-primary:hover{background:var(--gold-soft)}
  .btn-ghost{background:transparent; color:var(--muted); border:1px solid var(--line); margin-top:12px}
  .btn-ghost:hover{border-color:var(--gold); color:var(--gold-soft)}
  #msg{margin-top:18px; font-size:13px; text-align:center; min-height:18px; letter-spacing:.5px}
</style>
</head>
<body>
  <div class="card">
    <div class="crest">Est. Anatolia</div>
    <div class="brand">ESTA</div>
    <div class="rule"></div>
    <div class="sub">Emlak · Insaat · Bina Yonetimi</div>

    <label for="email">E-posta</label>
    <input id="email" type="email" placeholder="ornek@sirket.com">
    <label for="pass">Sifre</label>
    <input id="pass" type="password" placeholder="••••••••">

    <button class="btn btn-primary" onclick="girisYap()">Giris Yap</button>
    <button class="btn btn-ghost" onclick="kayitOl()">Yeni Hesap Olustur</button>
    <p id="msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(
      "https://pqwdvquguxddyymcpycl.supabase.co",
      "sb_publishable_kO2P-u-K-TfRlbwFvlQAsg_Pek28vM7"
    );
    async function girisYap() {
      const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
      msg.textContent = error ? error.message : "Giris basarili.";
      msg.style.color = error ? "#d98a8a" : "#C9A24B";
      if (!error) location.href = "panel.html";
    }
    async function kayitOl() {
      const { error } = await sb.auth.signUp({ email: email.value, password: pass.value });
      msg.textContent = error ? error.message : "Hesap olusturuldu. Giris yapabilirsiniz.";
      msg.style.color = error ? "#d98a8a" : "#C9A24B";
    }
  </script>
</body>
</html>
