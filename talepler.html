<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA — Talep & Duyuru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e0c0d;--panel:#181314;--panel-2:#201719;--line:#352529;--wine:#7b1f2b;--wine-soft:#9a2c3a;--gold:#c9a24b;--gold-soft:#e2c477;--text:#ece4dd;--muted:#9c8f88}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1200px 600px at 70% -10%, #1d1416 0%, var(--bg) 60%);color:var(--text);font-family:'Jost',sans-serif;min-height:100vh;font-weight:300}
  a{color:inherit;text-decoration:none}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:.5px}
  header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#1a1314,#0e0c0d)}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);letter-spacing:3px}
  .brand .sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{font-family:'Jost',sans-serif;font-size:13px;letter-spacing:.5px;cursor:pointer;border:1px solid var(--line);background:var(--panel-2);color:var(--text);padding:9px 16px;border-radius:8px;transition:.18s}
  .btn:hover{border-color:var(--gold);color:var(--gold-soft)}
  .btn.gold{background:linear-gradient(180deg,var(--gold),#a9842f);color:#1a1206;border:none;font-weight:500}
  .btn.gold:hover{filter:brightness(1.08)}
  .btn.danger{color:#e08f8f;border-color:#5a2a2a;background:transparent;padding:6px 12px;font-size:12px}
  .btn.danger:hover{background:#3a1416;color:#ffb3b3}
  .wrap{max-width:1080px;margin:0 auto;padding:32px 24px 80px}
  .head-row{margin-bottom:18px}
  .head-row h2{font-size:34px}
  .head-row p{color:var(--muted);font-size:14px;margin-top:4px}
  .controls{margin-bottom:18px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:16px}
  .controls label{font-size:12px;color:var(--muted);letter-spacing:.5px;display:block;margin-bottom:5px}
  select,input,textarea{background:#0f0b0c;border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Jost',sans-serif;font-size:14px;width:100%}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--gold)}
  .tabs{display:flex;gap:8px;margin-bottom:18px}
  .tab{padding:10px 20px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;color:var(--muted)}
  .tab.active{background:linear-gradient(180deg,var(--wine-soft),var(--wine));color:#fff;border-color:transparent}
  .formcard{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px;display:grid;gap:12px}
  .formcard .two{display:grid;grid-template-columns:2fr 1fr;gap:12px}
  table{width:100%;border-collapse:collapse;margin-top:6px}
  th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  th{color:var(--gold-soft);font-weight:500;font-size:12px;letter-spacing:1px;text-transform:uppercase}
  .durum-sel{padding:5px 8px;font-size:12px;width:auto}
  .badge{font-size:11px;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
  .b-acik{background:#3a1c1c;color:#e0a0a0}
  .b-islemde{background:#3a3320;color:#d6c27a}
  .b-cozuldu{background:#1c3320;color:#9fd58a}
  .empty{text-align:center;color:var(--muted);padding:46px 20px;border:1px dashed var(--line);border-radius:14px}
  .hidden{display:none}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1416;border:1px solid var(--gold);color:var(--gold-soft);padding:12px 20px;border-radius:10px;font-size:14px;display:none;z-index:60}
  .toast.show{display:block}
  .duyuru{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;position:relative;overflow:hidden}
  .duyuru::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--wine))}
  .duyuru h4{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold-soft);margin-bottom:4px}
  .duyuru .tarih{font-size:12px;color:var(--muted);margin-bottom:8px}
  .duyuru p{font-size:14px;color:var(--text);white-space:pre-wrap}
</style>
</head>
<body>
<header>
  <div class="brand"><div class="logo">ESTA</div><div class="sub">Talep & Duyuru</div></div>
  <div class="top-actions">
    <a class="btn" href="bina.html">Bina</a>
    <a class="btn" href="aidat.html">Aidat</a>
    <a class="btn" href="gider.html">Kasa</a>
    <a class="btn" href="panel.html">&larr; Panel</a>
    <button class="btn" id="logoutBtn">Cikis</button>
  </div>
</header>
<div class="wrap">
  <div class="head-row"><h2>Talep & Duyuru</h2><p>Sakin talepleri ve bina duyurularini yonetin.</p></div>
  <div class="controls"><label>Bina</label><select id="binaSec"></select></div>
  <div class="tabs">
    <div class="tab active" data-tab="talep">Ariza / Talep</div>
    <div class="tab" data-tab="duyuru">Duyurular</div>
  </div>

  <section id="tabTalep">
    <div class="formcard">
      <div class="two">
        <input id="t_baslik" placeholder="Talep basligi (orn: Asansor arizali)">
        <select id="t_durum"><option value="acik">Acik</option><option value="islemde">Islemde</option><option value="cozuldu">Cozuldu</option></select>
      </div>
      <textarea id="t_aciklama" rows="2" placeholder="Aciklama (istege bagli)"></textarea>
      <button class="btn gold" id="t_ekle" style="justify-self:start">+ Talep Ekle</button>
    </div>
    <div id="talepArea"></div>
  </section>

  <section id="tabDuyuru" class="hidden">
    <div class="formcard">
      <input id="d_baslik" placeholder="Duyuru basligi">
      <textarea id="d_icerik" rows="3" placeholder="Duyuru metni"></textarea>
      <button class="btn gold" id="d_ekle" style="justify-self:start">+ Duyuru Yayinla</button>
    </div>
    <div id="duyuruArea"></div>
  </section>
</div>
<div class="toast" id="toast"></div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient('https://pqwdvquguxddyymcpycl.supabase.co','sb_publishable_kO2P-u-K-TfRlbwFvlQAsg_Pek28vM7');
const $ = (id)=>document.getElementById(id);
const esc = (s)=> (s??'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

const { data:{ session } } = await supabase.auth.getSession();
if(!session){ location.href='login.html'; }
$('logoutBtn').onclick = async ()=>{ await supabase.auth.signOut(); location.href='login.html'; };

document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const tab = t.dataset.tab;
    $('tabTalep').classList.toggle('hidden', tab!=='talep');
    $('tabDuyuru').classList.toggle('hidden', tab!=='duyuru');
  };
});

async function loadBinalar(){
  const { data:binalar } = await supabase.from('binalar').select('*').order('created_at');
  const sel = $('binaSec');
  if(!binalar || !binalar.length){ sel.innerHTML='<option>Bina yok</option>'; return; }
  sel.innerHTML = binalar.map(b=>'<option value="'+b.id+'">'+esc(b.ad)+'</option>').join('');
  sel.onchange = ()=>{ loadTalepler(); loadDuyurular(); };
  loadTalepler(); loadDuyurular();
}

const durumBadge = (d)=> d==='cozuldu'?'<span class="badge b-cozuldu">Cozuldu</span>':d==='islemde'?'<span class="badge b-islemde">Islemde</span>':'<span class="badge b-acik">Acik</span>';

async function loadTalepler(){
  const binaId = $('binaSec').value; if(!binaId) return;
  const area = $('talepArea');
  const { data:talepler } = await supabase.from('talepler').select('*').eq('bina_id', binaId).order('created_at',{ascending:false});
  if(!talepler || !talepler.length){ area.innerHTML='<div class="empty">Henuz talep yok.</div>'; return; }
  let rows = talepler.map(t=>{
    const tarih = new Date(t.created_at).toLocaleDateString('tr-TR');
    return '<tr><td><b>'+esc(t.baslik)+'</b><br><span style="color:var(--muted);font-size:13px">'+(esc(t.aciklama)||'')+'</span></td>'+
      '<td>'+tarih+'</td>'+
      '<td><select class="durum-sel" data-durum="'+t.id+'">'+
      '<option value="acik"'+(t.durum==='acik'?' selected':'')+'>Acik</option>'+
      '<option value="islemde"'+(t.durum==='islemde'?' selected':'')+'>Islemde</option>'+
      '<option value="cozuldu"'+(t.durum==='cozuldu'?' selected':'')+'>Cozuldu</option></select></td>'+
      '<td>'+durumBadge(t.durum)+'</td>'+
      '<td><button class="btn danger" data-delt="'+t.id+'">Sil</button></td></tr>';
  }).join('');
  area.innerHTML = '<table><thead><tr><th>Talep</th><th>Tarih</th><th>Durum Degistir</th><th>Durum</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  area.querySelectorAll('[data-durum]').forEach(s=>{ s.onchange = async ()=>{
    const { error } = await supabase.from('talepler').update({ durum:s.value }).eq('id', s.dataset.durum);
    if(error){ toast('Hata'); return; } toast('Guncellendi'); loadTalepler();
  };});
  area.querySelectorAll('[data-delt]').forEach(b=>{ b.onclick = async ()=>{
    if(!confirm('Talep silinsin mi?')) return;
    await supabase.from('talepler').delete().eq('id', b.dataset.delt); toast('Silindi'); loadTalepler();
  };});
}

$('t_ekle').onclick = async ()=>{
  const binaId = $('binaSec').value; const baslik = $('t_baslik').value.trim();
  if(!binaId||binaId==='Bina yok'){ toast('Bina secin'); return; }
  if(!baslik){ toast('Baslik girin'); return; }
  const { error } = await supabase.from('talepler').insert({ bina_id:binaId, baslik, aciklama:$('t_aciklama').value.trim()||null, durum:$('t_durum').value });
  if(error){ toast('Hata: '+error.message); return; }
  $('t_baslik').value=''; $('t_aciklama').value=''; toast('Talep eklendi'); loadTalepler();
};

async function loadDuyurular(){
  const binaId = $('binaSec').value; if(!binaId) return;
  const area = $('duyuruArea');
  const { data:duyurular } = await supabase.from('duyurular').select('*').eq('bina_id', binaId).order('created_at',{ascending:false});
  if(!duyurular || !duyurular.length){ area.innerHTML='<div class="empty">Henuz duyuru yok.</div>'; return; }
  area.innerHTML = duyurular.map(d=>{
    const tarih = new Date(d.created_at).toLocaleString('tr-TR');
    return '<div class="duyuru"><h4>'+esc(d.baslik)+'</h4><div class="tarih">'+tarih+'</div><p>'+esc(d.icerik)+'</p>'+
      '<button class="btn danger" data-deld="'+d.id+'" style="margin-top:10px">Sil</button></div>';
  }).join('');
  area.querySelectorAll('[data-deld]').forEach(b=>{ b.onclick = async ()=>{
    if(!confirm('Duyuru silinsin mi?')) return;
    await supabase.from('duyurular').delete().eq('id', b.dataset.deld); toast('Silindi'); loadDuyurular();
  };});
}

$('d_ekle').onclick = async ()=>{
  const binaId = $('binaSec').value; const baslik = $('d_baslik').value.trim();
  if(!binaId||binaId==='Bina yok'){ toast('Bina secin'); return; }
  if(!baslik){ toast('Baslik girin'); return; }
  const { error } = await supabase.from('duyurular').insert({ bina_id:binaId, baslik, icerik:$('d_icerik').value.trim()||null });
  if(error){ toast('Hata: '+error.message); return; }
  $('d_baslik').value=''; $('d_icerik').value=''; toast('Duyuru yayinlandi'); loadDuyurular();
};

loadBinalar();
</script>
</body>
</html>
