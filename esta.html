<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA — Asistan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="/-esta-app/manifest.json">
<meta name="theme-color" content="#0e0c0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ESTA">
<link rel="apple-touch-icon" href="/-esta-app/%C4%B0KON.png">
<style>
  :root{--bg:#0e0c0d;--panel:#181314;--panel-2:#201719;--line:#352529;--wine:#7b1f2b;--wine-soft:#9a2c3a;--gold:#c9a24b;--gold-soft:#e2c477;--text:#ece4dd;--muted:#9c8f88}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1200px 600px at 70% -10%, #1d1416 0%, var(--bg) 60%);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;display:flex;flex-direction:column;height:100vh}
  a{color:inherit;text-decoration:none}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#1a1314,#0e0c0d)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);letter-spacing:3px}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .top-actions{display:flex;gap:8px;align-items:center}
  .btn{font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--panel-2);color:var(--text);padding:8px 14px;border-radius:8px;transition:.18s}
  .btn:hover{border-color:var(--gold);color:var(--gold-soft)}
  .chat{flex:1;overflow-y:auto;padding:24px;max-width:820px;width:100%;margin:0 auto}
  .msg{display:flex;margin-bottom:16px}
  .msg.user{justify-content:flex-end}
  .bubble{max-width:78%;padding:13px 16px;border-radius:14px;font-size:15px;line-height:1.5;white-space:pre-wrap}
  .msg.user .bubble{background:linear-gradient(180deg,var(--wine-soft),var(--wine));color:#fff;border-bottom-right-radius:4px}
  .msg.esta .bubble{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-bottom-left-radius:4px}
  .msg.esta .bubble.think{color:var(--muted);font-style:italic}
  .bubble img{max-width:200px;border-radius:8px;margin-bottom:8px;display:block}
  .karsilama{text-align:center;color:var(--muted);margin-top:40px}
  .karsilama .logo{font-family:'Cormorant Garamond',serif;font-size:52px;color:var(--gold);margin-bottom:8px}
  .oneri{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px}
  .oneri .o{padding:9px 14px;border:1px solid var(--line);border-radius:20px;cursor:pointer;font-size:13px;color:var(--gold-soft)}
  .oneri .o:hover{border-color:var(--gold)}
  .inputbar{border-top:1px solid var(--line);padding:14px 20px;background:linear-gradient(180deg,#0e0c0d,#140f10)}
  .inputwrap{max-width:820px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;background:#0f0b0c;border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--text);font-family:'Jost',sans-serif;font-size:15px;resize:none;max-height:140px}
  textarea:focus{outline:none;border-color:var(--gold)}
  .send{background:linear-gradient(180deg,var(--gold),#a9842f);color:#1a1206;border:none;border-radius:12px;padding:13px 18px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif}
  .send:disabled{opacity:.5;cursor:default}
  .ico{border:1px solid var(--line);background:var(--panel-2);color:var(--text);border-radius:12px;padding:13px 13px;cursor:pointer;font-size:17px;line-height:1}
  .ico:hover{border-color:var(--gold)}
  .ico.on{background:var(--wine);color:#fff;border-color:transparent}
  .dosya-onizleme{max-width:820px;margin:0 auto 10px;display:none;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .dosya-onizleme.show{display:flex}
  .dosya-onizleme img{height:44px;border-radius:6px}
  .dosya-onizleme span{font-size:13px;color:var(--gold-soft);flex:1}
  .dosya-onizleme button{background:transparent;border:none;color:#e08f8f;cursor:pointer;font-size:18px}
  input[type=file]{display:none}

  @media (max-width: 600px){
    header{padding:12px 14px}
    .brand .logo{font-size:22px}
    .brand .sub{display:none}
    .top-actions .btn{padding:7px 10px;font-size:12px}
    .chat{padding:16px 12px}
    .bubble{max-width:88%;font-size:14.5px}
    .karsilama .logo{font-size:42px}
    .inputbar{padding:10px 10px calc(10px + env(safe-area-inset-bottom))}
    .inputwrap{gap:6px;flex-wrap:nowrap}
    .ico{padding:11px 10px;font-size:16px}
    textarea{font-size:16px;padding:11px 10px;min-width:0}
    .send{padding:11px 12px;font-size:13px}
    .dosya-onizleme{padding:6px 10px}
  }
</style>
</head>
<body>
<header>
  <div class="brand"><div class="logo">ESTA</div><div class="sub">Asistan</div></div>
  <div class="top-actions">
    <button class="btn" id="sesToggle">🔊 Ses: Açık</button>
    <a class="btn" href="panel.html">← Panel</a>
  </div>
</header>
<div class="chat" id="chat">
  <div class="karsilama" id="karsilama">
    <div class="logo">Esta</div>
    <div>Merhaba Halime. Sohbet edebiliriz, işini sorabilirsin, ya da bir belge/fatura gönder — okuyayım.</div>
    <div class="oneri">
      <div class="o">Bugün ne yapmalıyım?</div>
      <div class="o">Kasada durum ne?</div>
      <div class="o">Nasılsın?</div>
    </div>
  </div>
</div>
<div class="inputbar">
  <div class="dosya-onizleme" id="onizleme">
    <img id="onizlemeImg" style="display:none">
    <span id="onizlemeAd"></span>
    <button id="dosyaSil">✕</button>
  </div>
  <div class="inputwrap">
    <button class="ico" id="dosyaBtn" title="Dosya seç">📎</button>
    <button class="ico" id="kameraBtn" title="Fotoğraf çek">📷</button>
    <button class="ico" id="mic" title="Konuş">🎤</button>
    <textarea id="input" rows="1" placeholder="Esta'ya yaz, konuş ya da belge gönder..."></textarea>
    <button class="send" id="send">Gönder</button>
  </div>
</div>
<input type="file" id="dosyaInput" accept="image/*,application/pdf">
<input type="file" id="kameraInput" accept="image/*" capture="environment">

<script>
const SERVER = 'https://esta-server.onrender.com';
const $ = (id)=>document.getElementById(id);
let sesAcik = true;
let sonSes = null;
let seciliDosya = null;

const chat=$('chat'), input=$('input');
input.addEventListener('input', ()=>{ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,140)+'px'; });
input.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); gonder(); } });
$('send').onclick=gonder;
document.querySelectorAll('.oneri .o').forEach(o=>o.onclick=()=>{ input.value=o.textContent; gonder(); });

$('sesToggle').onclick=()=>{ sesAcik=!sesAcik; $('sesToggle').textContent = sesAcik?'🔊 Ses: Açık':'🔇 Ses: Kapalı'; if(!sesAcik){ if(sonSes){sonSes.pause();sonSes=null;} if('speechSynthesis' in window) speechSynthesis.cancel(); } };

$('dosyaBtn').onclick = ()=> $('dosyaInput').click();
$('kameraBtn').onclick = ()=> $('kameraInput').click();
$('dosyaInput').onchange = (e)=> dosyaSec(e.target.files[0]);
$('kameraInput').onchange = (e)=> dosyaSec(e.target.files[0]);
$('dosyaSil').onclick = ()=>{ seciliDosya=null; $('onizleme').classList.remove('show'); $('dosyaInput').value=''; $('kameraInput').value=''; };

function dosyaSec(f){
  if(!f) return;
  if(f.size > 18*1024*1024){ alert('Dosya çok büyük (en fazla 18 MB)'); return; }
  const reader = new FileReader();
  reader.onload = ()=>{
    const base64 = reader.result.split(',')[1];
    seciliDosya = { data: base64, type: f.type, name: f.name };
    $('onizleme').classList.add('show');
    $('onizlemeAd').textContent = f.name;
    if(f.type.startsWith('image/')){
      $('onizlemeImg').src = reader.result;
      $('onizlemeImg').style.display = 'block';
    } else {
      $('onizlemeImg').style.display = 'none';
    }
  };
  reader.readAsDataURL(f);
}

function ekle(kim, metin, think, resimUrl){
  const k=$('karsilama'); if(k) k.remove();
  const d=document.createElement('div'); d.className='msg '+kim;
  const b=document.createElement('div'); b.className='bubble'+(think?' think':'');
  if(resimUrl){ const im=document.createElement('img'); im.src=resimUrl; b.appendChild(im); }
  const t=document.createElement('div'); t.textContent=metin; b.appendChild(t);
  d.appendChild(b);
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
  return d;
}

function sesMetni(metin){
  return metin
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/[*#_`>|~^]/g, ' ')
    .replace(/^[\s]*[-•]\s*/gm, ' ')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/https?:\/\/\S+/g, 'bağlantı')
    .replace(/(\d)\.(?=\s)/g, '$1 ')
    .replace(/₺/g, ' lira ')
    .replace(/\bTL\b/g, ' lira')
    .replace(/&/g, ' ve ')
    .replace(/\s+/g, ' ')
    .replace(/\s([,.!?:;])/g, '$1')
    .trim();
}

async function seslendir(metin){
  if(!sesAcik) return;
  const temiz = sesMetni(metin);
  if(!temiz) return;
  try{
    if(sonSes){ sonSes.pause(); sonSes=null; }
    const r = await fetch(SERVER+'/ses', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ metin: temiz }) });
    if(!r.ok) throw new Error('ses alinamadi');
    const blob = await r.blob();
    sonSes = new Audio(URL.createObjectURL(blob));
    sonSes.play();
  }catch(err){
    if('speechSynthesis' in window){
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(temiz);
      u.lang='tr-TR'; speechSynthesis.speak(u);
    }
  }
}

async function gonder(){
  const soru=input.value.trim();
  if(!soru && !seciliDosya) return;
  const dosya = seciliDosya;
  const resimUrl = (dosya && dosya.type.startsWith('image/')) ? 'data:'+dosya.type+';base64,'+dosya.data : null;

  input.value=''; input.style.height='auto';
  seciliDosya=null; $('onizleme').classList.remove('show'); $('dosyaInput').value=''; $('kameraInput').value='';

  ekle('user', soru || (dosya ? dosya.name : ''), false, resimUrl);
  const bekle=ekle('esta', dosya ? 'Esta belgeyi okuyor...' : 'Esta düşünüyor...', true);
  $('send').disabled=true;
  try{
    const body = { question: soru };
    if(dosya) body.dosya = { data: dosya.data, type: dosya.type };
    const r=await fetch(SERVER+'/ask',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data=await r.json();
    bekle.remove();
    const cevap = data.answer || (data.error ? ('Hata: '+data.error) : 'Cevap alınamadı.');
    ekle('esta', cevap);
    seslendir(cevap);
  }catch(err){
    bekle.remove();
    ekle('esta','Sunucuya ulaşamadım. (İlk açılışta sunucu uyanması 50 sn sürebilir, tekrar dene.)');
  }finally{ $('send').disabled=false; }
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  const rec=new SR(); rec.lang='tr-TR'; rec.interimResults=false;
  let dinliyor=false;
  $('mic').onclick=()=>{ if(dinliyor){ rec.stop(); return; } rec.start(); };
  rec.onstart=()=>{ dinliyor=true; $('mic').classList.add('on'); };
  rec.onend=()=>{ dinliyor=false; $('mic').classList.remove('on'); };
  rec.onresult=(e)=>{ input.value=e.results[0][0].transcript; gonder(); };
}else{ $('mic').style.display='none'; }

// Açılışta Esta seni karşılasın ve günü özetlesin
window.addEventListener('load', ()=>{
  setTimeout(async ()=>{
    const saat = new Date().getHours();
    const selam = saat < 11 ? 'Günaydın' : (saat < 18 ? 'Merhaba' : 'İyi akşamlar');
    const bekle = ekle('esta', 'Esta bakıyor...', true);
    try{
      const r = await fetch(SERVER+'/ask', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question: selam + ' de ve bugünün kısa özetini ver. Yaklaşan hatırlatmalar, biten kontratlar, ödeme günleri, kasa durumu gibi önemli ne varsa söyle. Önemli bir şey yoksa sadece sıcak bir selam ver ve nasıl olduğumu sor. Kısa tut, arkadaş gibi konuş.' })
      });
      const data = await r.json();
      bekle.remove();
      const cevap = data.answer || (selam + ' Halime! Bugün nasılsın?');
      ekle('esta', cevap);
      seslendir(cevap);
    }catch(err){
      bekle.remove();
      ekle('esta', selam + ' Halime! Sunucu uyanıyor, bir saniye... Sonra konuşalım.');
    }
  }, 600);
});
</script>
</body>
</html>
